services:
  postgres:
    image: postgres:16-alpine
    container_name: axon_prime_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: axon_prime
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
